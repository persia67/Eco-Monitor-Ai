name: Build Cross-Platform App (Windows & Android)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows Desktop Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      - name: Package Windows Desktop Installer
        run: npx electron-builder build --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Organize Compiled Packages
        shell: bash
        run: |
          mkdir -p build-outputs
          if [ -d "dist-electron" ]; then
            find dist-electron -maxdepth 1 -name "*.exe" -exec cp {} build-outputs/ \; || true
          fi

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoMonitor-Windows-Installer
          path: build-outputs/*
          if-no-files-found: error
          retention-days: 14

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-outputs/*.exe
          draft: false
          prerelease: false
          body: |
            ## 🚀 نسخه جدید پلتفرم EcoMonitor AI منتشر شد
            
            تغییرات اخیر با موفقیت اعمال شده و خروجی‌های معتبر دسکتاپ و موبایل ساخته شدند.
            
            * **نسخه ویندوز (Windows Installer)**: فایل `.exe` جهت نصب روی سیستم‌عامل ویندوز.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android Mobile Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Generate Capacitor Android App
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android Packages (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Organize Compiled Packages
        run: |
          mkdir -p build-outputs
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk build-outputs/EcoMonitor-Android-Debug.apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-outputs/EcoMonitor-Android-Release-Unsigned.apk
          fi

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoMonitor-Android-Apk
          path: build-outputs/*
          if-no-files-found: error
          retention-days: 14

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-outputs/*.apk
          draft: false
          prerelease: false
          body: |
            ## 🚀 نسخه جدید پلتفرم EcoMonitor AI منتشر شد
            
            تغییرات اخیر با موفقیت اعمال شده و خروجی‌های معتبر دسکتاپ و موبایل ساخته شدند.
            
            * **نسخه اندروید (Android Mobile)**: فایل `.apk` جهت نصب روی گوشی‌ها و تبلت‌های هوشمند اندرویدی کارگاه و اتاق کنترل.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
