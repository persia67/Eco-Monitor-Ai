name: Build Cross-Platform App (Windows & Android)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows Desktop Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      - name: Package Windows Desktop Installer
        run: npx electron-builder build --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Organize Compiled Packages
        shell: bash
        run: |
          mkdir -p build-outputs
          cp dist-electron/*.exe build-outputs/ 2>/dev/null || true

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoMonitor-Windows-Installer
          path: build-outputs/*
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android Mobile Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Generate Capacitor Android App
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Regenerate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.14.3

      - name: Build Android Packages (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Organize Compiled Packages
        run: |
          mkdir -p build-outputs
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk build-outputs/EcoMonitor-Android-Debug.apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-outputs/EcoMonitor-Android-Release-Unsigned.apk
          fi

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoMonitor-Android-Apk
          path: build-outputs/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create & Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Create build-outputs Directory
        run: mkdir -p build-outputs

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: EcoMonitor-Windows-Installer
          path: build-outputs

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: EcoMonitor-Android-Apk
          path: build-outputs

      - name: Display Downloaded Files
        run: ls -la build-outputs

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          files: |
            build-outputs/*.exe
            build-outputs/*.apk
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ## 🚀 نسخه جدید پلتفرم EcoMonitor AI منتشر شد
            
            آخرین تغییرات برنامه با موفقیت کامپایل و آماده‌سازی شدند. از بخش زیر می‌توانید خروجی‌های معتبر دسکتاپ و موبایل را به صورت مستقیم دانلود کنید:
            
            * **💻 نسخه دسکتاپ ویندوز (Windows Installer)**: فایل نصب `.exe` جهت رصد و مانیتورینگ روی کامپیوترها و ویندوز کارخانه.
            * **📱 نسخه اندروید موبایل (Android APK)**: فایل `.apk` جهت نصب روی گوشی‌ها و تبلت‌های هوشمند اندرویدی واحد کنترل.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
