name: Build Cross-Platform App (Windows & Android)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Package Installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      # --- DESKTOP WINDOWS COMPILATION (via Electron Builder on Linux) ---
      - name: Package Windows Desktop Installer
        run: |
          npx electron-builder build --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- MOBILE ANDROID COMPILATION (via Capacitor & Gradle) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Generate Capacitor Android App
        run: |
          # Dynamically add the Android platform directory
          npx cap add android
          # Sync Web code (dist/) and settings to Android native directory
          npx cap sync android

      - name: Build Android Packages (APK)
        run: |
          cd android
          chmod +x gradlew
          # Build standard test debug APK
          ./gradlew assembleDebug
          # Build production release APK (unsigned)
          ./gradlew assembleRelease

      # --- ARTIFACT MANAGEMENT & PUBLISHING ---
      - name: Organize Compiled Packages
        run: |
          mkdir -p build-outputs
          
          # 1. Capture Windows Executables
          if [ -d "dist-electron" ]; then
            find dist-electron -maxdepth 1 -name "*.exe" -exec cp {} build-outputs/ \; || true
          fi
          
          # 2. Capture Android APKs
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk build-outputs/EcoMonitor-Android-Debug.apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-outputs/EcoMonitor-Android-Release-Unsigned.apk
          fi

      - name: Upload Installers as GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EcoMonitor-Installers
          path: build-outputs/*
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-outputs/*.exe
            build-outputs/*.apk
          draft: false
          prerelease: false
          body: |
            ## 🚀 نسخه جدید پلتفرم EcoMonitor AI منتشر شد
            
            تغییرات اخیر با موفقیت اعمال شده و خروجی‌های معتبر دسکتاپ و موبایل ساخته شدند:
            
            * **نسخه ویندوز (Windows Installer)**: فایل `.exe` جهت نصب روی سیستم‌عامل ویندوز.
            * **نسخه اندروید (Android Mobile)**: فایل `.apk` جهت نصب روی گوشی‌ها و تبلت‌های هوشمند اندرویدی کارگاه و اتاق کنترل.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
