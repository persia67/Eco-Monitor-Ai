---
- name: Deploy EcoMonitor AI - React Vite Production Web Application
  hosts: all
  become: true
  vars:
    # --- Configurable Variables ---
    app_dir: "/var/www/ecomonitor-ai"
    node_version: "20.x"
    nginx_server_name: "ecomonitor.local" # Change this to your server's domain or IP Address

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Install prerequisite packages
      apt:
        name:
          - curl
          - git
          - gnupg
          - nginx
          - build-essential
        state: present
      when: ansible_os_family == "Debian"

    - name: Set up Node.js repository (NodeSource)
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }} | bash -
      args:
        creates: "/etc/apt/sources.list.d/nodesource.list"
      when: ansible_os_family == "Debian"

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure target directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Copy application source files to destination
      copy:
        src: "./"
        dest: "{{ app_dir }}"
        owner: www-data
        group: www-data
        mode: '0755'
        exclude:
          - "node_modules"
          - "dist"
          - ".git"
          - ".env"

    - name: Install NPM dependencies
      npm:
        path: "{{ app_dir }}"
        state: present

    - name: Build the React + Vite application (Production Build)
      command: npm run build
      args:
        chdir: "{{ app_dir }}"
      become_user: www-data

    - name: Configure Nginx virtual host for Single Page Application (SPA)
      copy:
        dest: "/etc/nginx/sites-available/ecomonitor-ai"
        content: |
          server {
              listen 80;
              server_name {{ nginx_server_name }};

              root {{ app_dir }}/dist;
              index index.html;

              # Support React Router/SPA routing mechanisms safely
              location / {
                  try_files $uri $uri/ /index.html;
              }

              # Gzip Compression settings
              gzip on;
              gzip_vary on;
              gzip_min_length 10240;
              gzip_proxied expired no-cache no-store private auth;
              gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
              gzip_disable "MSIE [1-6]\.";

              # Cache headers for static assets
              location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
                  expires 6M;
                  access_log off;
                  add_header Cache-Control "public";
              }

              error_log /var/log/nginx/ecomonitor_error.log;
              access_log /var/log/nginx/ecomonitor_access.log;
          }
        owner: root
        group: root
        mode: '0644'
      notify: Reload Nginx

    - name: Enable Nginx virtual host site config
      file:
        src: "/etc/nginx/sites-available/ecomonitor-ai"
        dest: "/etc/nginx/sites-enabled/ecomonitor-ai"
        state: link

    - name: Remove default Nginx virtual host config if exists
      file:
        path: "/etc/nginx/sites-enabled/default"
        state: absent
      notify: Restart Nginx

    - name: Verify Nginx configuration syntax is intact
      command: nginx -t
      changed_when: false

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
