<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سامانه هوشمند پایش آلاینده‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Vazirmatn', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
    </style>
    <!-- Global Error Handler for White Screen Debugging -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === "") {
             document.body.innerHTML = `
                <div style="padding: 20px; color: #ef4444; background: #1e293b; height: 100vh; font-family: sans-serif; text-align: center;">
                    <h1>Critical Error (White Screen Protection)</h1>
                    <p>The application failed to start.</p>
                    <pre style="background: #0f172a; padding: 10px; border-radius: 8px; text-align: left; overflow: auto;">
${message}
Location: ${source}:${lineno}:${colno}
                    </pre>
                </div>
             `;
        }
      };
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>
  </body>
</html>
